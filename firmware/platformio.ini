; PlatformIO Configuration for Digi-Shaker
; ESP32 NodeMCU (CH340, USB-C) driving MG996R servo

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; ESP32Servo for hardware PWM servo control
lib_deps =
    madhephaestus/ESP32Servo@^3.0.6
    links2004/WebSockets@^2.6.1
    bblanchon/ArduinoJson@^7.4.1

monitor_speed = 115200
